name: Deploy KeplerX

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      # Build Frontend
      - name: Build Frontend
        working-directory: ./frontend
        run: |
          npm install
          npm run build
        env:
          NODE_OPTIONS: "--openssl-legacy-provider"
          CI: false

      # Build Backend
      - name: Build Backend
        working-directory: ./backend
        run: |
          npm install
          npm run build

      - name: Package Build
        run: |
          zip -r deploy.zip frontend/build backend/dist backend/package.json backend/package-lock.json

      # Deploy to VPS using Shell (More Visible Errors)
      - name: Deploy and Restart
        run: |
          echo "${{ secrets.VPS_SSH_KEY }}" > deploy_key
          chmod 600 deploy_key
          
          # Debug: Check if zip exists
          ls -lh deploy.zip
          
          # Upload with detailed error output
          scp -v -o StrictHostKeyChecking=no -i deploy_key deploy.zip ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/newuser/keplerx/
          
          # Unpack and Start
          ssh -v -o StrictHostKeyChecking=no -i deploy_key ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "
            cd /home/newuser/keplerx && \
            unzip -o deploy.zip && \
            cd backend && \
            npm install --production && \
            pm2 restart keplerx-backend || pm2 start dist/server.js --name keplerx-backend && \
            rm ../deploy.zip
          "
        env:
          SSH_AUTH_SOCK: /tmp/ssh_agent.sock
